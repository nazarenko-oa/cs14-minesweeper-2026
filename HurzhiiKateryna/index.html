<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Segoe UI, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
}

.container {
  width: 100%;
  max-width: 420px;
}

.game-wrapper {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.game-title {
  text-align: center;
  margin-bottom: 15px;
  font-size: 2em;
  color: #333;
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  background: #f0f0f0;
  padding: 10px;
  border-radius: 8px;
}

.header-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 13px;
  color: #555;
}

.value {
  font-size: 18px;
  font-weight: bold;
}

.start-button {
  padding: 6px 18px;
  border: none;
  border-radius: 20px;
  background: #667eea;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.start-button:hover {
  background: #5565d8;
}

.game-board {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 2px;
  background: #ddd;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.cell {
  aspect-ratio: 1;
  background: linear-gradient(#e0e0e0,#999);
  border: 1px solid #777;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 3px;
}

.cell:hover {
  background: linear-gradient(#ececec,#b5b5b5);
}

.cell.revealed {
  background: #eee;
  border: 1px solid #aaa;
  cursor: default;
}

.cell.mine {
  background: #ff6b6b;
  color: white;
}

.cell.flagged {
  background: #fff3a0;
}

.n1{color:blue;}
.n2{color:green;}
.n3{color:red;}
.n4{color:darkblue;}
.n5{color:brown;}
.n6{color:teal;}
.n7{color:black;}
.n8{color:gray;}

.game-info {
  font-size: 13px;
  color: #555;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="game-wrapper">
    <h1 class="game-title">Minesweeper</h1>

    <div class="game-header">
      <div class="header-item">
        <span class="label">Час</span>
        <span class="value">0</span>
      </div>

      <button class="start-button">Нова гра</button>

      <div class="header-item">
        <span class="label">Прапорців</span>
        <span class="value">0</span>
      </div>
    </div>

    <div class="game-board">

      
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

      
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>
      <button class="cell revealed"></button>

      
      <button class="cell revealed n1">1</button>
      <button class="cell revealed n2">2</button>
      <button class="cell revealed n3">3</button>
      <button class="cell revealed n4">4</button>
      <button class="cell revealed n5">5</button>
      <button class="cell revealed n6">6</button>
      <button class="cell revealed n7">7</button>
      <button class="cell revealed n8">8</button>
      <button class="cell revealed n1">1</button>
      <button class="cell revealed n2">2</button>

      
      <button class="cell revealed mine">💣</button>
      <button class="cell flagged">🚩</button>
      <button class="cell revealed mine">💣</button>
      <button class="cell flagged">🚩</button>
      <button class="cell revealed mine">💣</button>
      <button class="cell flagged">🚩</button>
      <button class="cell revealed mine">💣</button>
      <button class="cell flagged">🚩</button>
      <button class="cell revealed mine">💣</button>
      <button class="cell flagged">🚩</button>

      
      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>
      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>

      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>
      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>

      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>
      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>

      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>
      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>

      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>
      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>

      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>
      <button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button><button class="cell"></button>

    </div>

    <div class="game-info">
      <p>💡 Ліва кнопка миші: відкрити клітинку</p>
      <p>🖱️ Права кнопка миші: поставити прапорець</p>
      <p>⚙️ Кнопка "Нова гра": почати гру заново</p>
    </div>
  </div>
</div>

</body>
</html>
